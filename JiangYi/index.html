<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe JiangYi - 初次相遇</title>
    <style>
        /* --- 基礎設定與畫面排版 --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 1280px; /* 遊戲標準寬度 */
            height: 720px; /* 遊戲標準高度 */
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* 背景圖片 */
        #bg-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease-in-out;
        }

        /* --- 對話框設計 --- */
        #dialogue-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 180px;
            background-color: rgba(20, 20, 20, 0.85); /* 黑色半透明底 */
            border: 2px solid #a67c52; /* 咖啡色邊框 */
            border-radius: 10px;
            box-sizing: border-box;
            padding: 40px 30px 20px 30px;
            color: #fff;
            cursor: pointer;
            display: none; /* 預設隱藏 */
        }

        /* 說話者名字 */
        #speaker-name {
            position: absolute;
            top: -20px;
            left: 30px;
            background-color: #a67c52; /* 呼應咖啡廳的顏色 */
            color: #fff;
            padding: 5px 20px;
            font-size: 22px;
            font-weight: bold;
            border-radius: 5px;
            letter-spacing: 2px;
            display: none;
        }

        /* 對話內文 */
        #dialogue-text {
            font-size: 22px;
            line-height: 1.6;
            letter-spacing: 1px;
        }

        /* --- 選項按鈕設計 --- */
        #options-container {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 60%;
            display: none; /* 預設隱藏 */
        }

        .option-btn {
            background-color: rgba(255, 255, 255, 0.9);
            color: #333;
            border: 2px solid #a67c52;
            padding: 15px 20px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .option-btn:hover {
            background-color: #a67c52;
            color: #fff;
        }

        /* --- 紙條互動系統 --- */
        #interact-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px dashed #a67c52;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: bold;
            color: #5c3a21;
            cursor: pointer;
            border-radius: 10px;
            animation: pulse 1.5s infinite;
            display: none; /* 預設隱藏 */
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(166, 124, 82, 0.7); }
            70% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 0 15px rgba(166, 124, 82, 0); }
            100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 0 0 rgba(166, 124, 82, 0); }
        }

        /* 紙條特寫畫面 (Modal) */
        #paper-modal {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none; /* 預設隱藏 */
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #paper-content {
            background-color: #fdf5e6; /* 紙張顏色 */
            width: 500px;
            height: 300px;
            padding: 40px;
            box-sizing: border-box;
            border-radius: 5px;
            box-shadow: 2px 2px 15px rgba(0,0,0,0.5);
            font-family: "Kaiti", "DFKai-SB", serif; /* 營造手寫字體感 */
            font-size: 30px;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transform: rotate(-2deg); /* 微微傾斜更自然 */
        }

        .click-hint {
            position: absolute;
            bottom: 10px;
            right: 20px;
            font-size: 14px;
            color: #888;
        }

    </style>
</head>
<body>

<div id="game-container">
    <img id="bg-image" src="" alt="背景">
    
    <div id="options-container"></div>

    <div id="interact-btn" onclick="openPaper()">點擊查看紙條</div>

    <div id="paper-modal" onclick="closePaper()">
        <div id="paper-content">
            『可以坐久一點沒關係。』
            <span class="click-hint">▼ 點擊關閉</span>
        </div>
    </div>

    <div id="dialogue-box" onclick="nextLine()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
        <span class="click-hint">▼ 點擊繼續</span>
    </div>
</div>

<script>
    // --- 劇本資料庫 ---
    const scriptLines = [
        { bg: "Street-1.jpg", speaker: "女主角 (OS)", text: "好累……經歷了一個早上的課程，好想找個地方趴一下……<br>嗯？好濃郁的咖啡烘焙香氣……" },
        { bg: "Wind chimes.jpg", speaker: "", text: "（妳順著香味，推開了街角一間咖啡廳的門。）<br>— 清脆的風鈴聲響起 —" },
        { bg: "Start Counter.jpg", speaker: "江逸", text: "你好～歡迎光臨，請問今天想喝點什麼？" },
        { bg: "Start Counter.jpg", speaker: "女主角 (OS)", text: "（有點累，腦袋鈍鈍的，不想再思考了……）", 
          options: [
              { text: "我第一次來，請問有什麼推薦的嗎？", nextLine: 4 },
              { text: "我想要……一杯熱美式就好……", nextLine: 5 }
          ] 
        },
        // 選項 A 路線 (Index 4)
        { bg: "Making Coffee.jpg", speaker: "江逸", text: "看妳好像有點累。如果怕太苦的話，可以考慮「熱的燕麥奶拿鐵」。<br>燕麥奶的甜味會中和濃縮咖啡的苦澀，適合想稍微打起精神，但怕咖啡因太多的時候。", nextLine: 6 },
        // 選項 B 路線 (Index 5)
        { bg: "Making Coffee.jpg", speaker: "江逸", text: "好的，一杯熱美式。<br>不過看妳好像有點累，如果怕美式太傷胃，要不要幫妳換成溫和一點的「熱的燕麥奶拿鐵」？", nextLine: 6 },
        
        // 合流路線 (Index 6)
        { bg: "Start Counter.jpg", speaker: "女主角", text: "（好貼心的提醒……）<br>好～那一杯熱的燕麥奶拿鐵就可以了～謝謝你！" },
        { bg: "Start Counter.jpg", speaker: "江逸", text: "有想坐在哪裡嗎？如果不介意的話，可以考慮靠窗的那個座位。" },
        { bg: "Seat Window.jpg", speaker: "女主角", text: "好啊，謝謝你！<br>（輕輕深呼吸，嘴角緩緩揚起）" },
        { bg: "Seat Window.jpg", speaker: "女主角 (OS)", text: "感覺坐在這裡好放鬆……似乎找到了屬於自己的秘密基地了呢～" },
        
        // 托盤與紙條事件 (Index 10)
        { bg: "Tray.jpg", speaker: "女主角", text: "好香的味道～<br>（看著托盤上的咖啡，旁邊似乎壓著一張折起來的紙條）", action: "showPaperInteract" },
        { bg: "Tray.jpg", speaker: "旁白", text: "看完紙條的那刻，心頭暖暖的，露出了十分滿足的微笑。" }
    ];

    let currentIndex = 0;
    let isWaitingForInput = false;

    // --- 核心控制函數 ---
    function renderLine(index) {
        if (index >= scriptLines.length) {
            document.getElementById("dialogue-text").innerHTML = "<b>（本次展示結束，敬請期待後續劇情！）</b>";
            document.getElementById("speaker-name").style.display = "none";
            return;
        }

        const line = scriptLines[index];
        
        // 1. 更新背景圖
        document.getElementById("bg-image").src = line.bg;

        // 2. 更新說話者名字
        const nameBox = document.getElementById("speaker-name");
        if (line.speaker) {
            nameBox.innerText = line.speaker;
            nameBox.style.display = "block";
        } else {
            nameBox.style.display = "none";
        }

        // 3. 更新對話內容
        document.getElementById("dialogue-text").innerHTML = line.text;
        document.getElementById("dialogue-box").style.display = "block";

        // 4. 檢查是否有特殊互動 (紙條)
        if (line.action === "showPaperInteract") {
            isWaitingForInput = true; // 暫停對話點擊
            document.getElementById("interact-btn").style.display = "block";
            document.getElementById("dialogue-box").style.pointerEvents = "none"; // 暫時關閉對話框點擊
        }

        // 5. 檢查是否有選項
        if (line.options) {
            isWaitingForInput = true;
            document.getElementById("dialogue-box").style.pointerEvents = "none";
            const optionsContainer = document.getElementById("options-container");
            optionsContainer.innerHTML = ""; // 清空舊選項
            
            line.options.forEach(opt => {
                const btn = document.createElement("div");
                btn.className = "option-btn";
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.nextLine);
                optionsContainer.appendChild(btn);
            });
            optionsContainer.style.display = "flex";
        }
    }

    // 點擊對話框進行下一句
    function nextLine() {
        if (isWaitingForInput) return; // 如果在等選項或紙條，就不能點對話框

        const currentLine = scriptLines[currentIndex];
        
        // 檢查是否需要跳轉 (例如選項結束後的匯合)
        if (currentLine.nextLine !== undefined) {
            currentIndex = currentLine.nextLine;
        } else {
            currentIndex++;
        }
        
        renderLine(currentIndex);
    }

    // 點擊選項
    function selectOption(nextIndex) {
        document.getElementById("options-container").style.display = "none";
        document.getElementById("dialogue-box").style.pointerEvents = "auto";
        isWaitingForInput = false;
        currentIndex = nextIndex;
        renderLine(currentIndex);
    }

    // --- 紙條系統 ---
    function openPaper() {
        document.getElementById("interact-btn").style.display = "none";
        document.getElementById("paper-modal").style.display = "flex";
    }

    function closePaper() {
        document.getElementById("paper-modal").style.display = "none";
        document.getElementById("dialogue-box").style.pointerEvents = "auto";
        isWaitingForInput = false;
        currentIndex++; // 看完紙條自動進到下一句旁白
        renderLine(currentIndex);
    }

    // --- 遊戲啟動 ---
    window.onload = () => {
        renderLine(currentIndex);
    };

</script>
</body>
</html>
