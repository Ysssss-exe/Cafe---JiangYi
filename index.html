<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe JiangYi - 初次相遇</title>
    <style>
        /* --- 基礎設定 --- */
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 1280px; height: 720px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease-in-out; }

        /* 往回按鈕 */
        #back-btn { position: absolute; top: 20px; right: 20px; background-color: rgba(166, 124, 82, 0.7); color: white; border: 1px solid #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 100; font-size: 16px; transition: 0.3s; }
        #back-btn:hover { background-color: rgba(166, 124, 82, 1); }
        #back-btn:disabled { display: none; }

        /* 對話框 */
        #dialogue-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 180px; background-color: rgba(20, 20, 20, 0.85); border: 2px solid #a67c52; border-radius: 10px; box-sizing: border-box; padding: 40px 30px 20px 30px; color: #fff; cursor: pointer; display: none; z-index: 50; }
        #speaker-name { position: absolute; top: -20px; left: 30px; background-color: #a67c52; color: #fff; padding: 5px 20px; font-size: 22px; font-weight: bold; border-radius: 5px; letter-spacing: 2px; }
        #dialogue-text { font-size: 22px; line-height: 1.6; letter-spacing: 1px; }

        /* 選項 */
        #options-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 20px; width: 60%; display: none; z-index: 60; }
        .option-btn { background-color: rgba(255, 255, 255, 0.9); color: #333; border: 2px solid #a67c52; padding: 15px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; text-align: center; }
        .option-btn:hover { background-color: #a67c52; color: #fff; }

        /* 紙條系統 */
        #interact-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.8); border: 2px dashed #a67c52; padding: 15px 30px; font-size: 24px; font-weight: bold; color: #5c3a21; cursor: pointer; border-radius: 10px; display: none; z-index: 70; }
        #paper-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 80; }
        #paper-content { background-color: #fdf5e6; width: 500px; height: 300px; padding: 40px; box-sizing: border-box; border-radius: 5px; font-size: 30px; color: #333; display: flex; justify-content: center; align-items: center; text-align: center; transform: rotate(-2deg); }
    </style>
</head>
<body>

<div id="game-container">
    <img id="bg-image" src="" alt="背景">
    <button id="back-btn" onclick="prevLine()" disabled>← 往回</button>
    <div id="options-container"></div>
    <div id="interact-btn" onclick="openPaper()">點擊查看紙條</div>
    <div id="paper-modal" onclick="closePaper()"><div id="paper-content">『可以坐久一點沒關係。』</div></div>
    <div id="dialogue-box" onclick="nextLine()">
        <div id="speaker-name"></div>
        <div id="dialogue-text"></div>
    </div>
</div>

<script>
    const scriptLines = [
        { bg: "JiangYi/Street-1.png", speaker: "女主角 (OS)", text: "好累……經歷了一個早上的課程，好想找個地方趴一下……<br>嗯？好濃郁的咖啡烘焙香氣……" },
        { bg: "JiangYi/Wind chimes.png", speaker: "", text: "（妳順著香味，推開了街角一間咖啡廳的門。）<br>— 清脆的風鈴聲響起 —" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "你好～歡迎光臨，請問今天想喝點什麼？" },
        
        // 這裡對應你放在根目錄的「咖啡廳菜單」
        { bg: "Menu.png", speaker: "女主角 (OS)", text: "（有點累，腦袋鈍鈍的，不想再思考了……看看菜單上有什麼吧……）", 
          options: [
              { text: "我第一次來，請問有什麼推薦的嗎？", nextLine: 4 },
              { text: "我想要……一杯熱美式就好……", nextLine: 5 }
          ] 
        },
        
        // 分歧 A
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "看妳好像有點累。如果怕太苦的話，可以考慮「熱的燕麥奶拿鐵」。<br>燕麥奶的甜味會中和咖啡的苦，適合想稍微打起精神的時候。", nextLine: 6 },
        // 分歧 B
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "好的，一杯熱美式。<br>不過看妳好像有點累，如果不急，要不要幫妳換成溫和一點的「熱的燕麥奶拿鐵」？", nextLine: 6 },
        
        // 合流
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "好～那一杯熱的燕麥奶拿鐵就可以了～謝謝你！" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "有想坐在哪裡嗎？如果不介意的話，可以考慮靠窗的那個座位。" },
        { bg: "JiangYi/Love Seat.png", speaker: "女主角", text: "好啊，謝謝你！" },
        { bg: "JiangYi/Seat Window.png", speaker: "女主角 (OS)", text: "（坐在窗邊，感覺這份寧靜正一點一滴地治癒著疲憊……）" },
        { bg: "JiangYi/Tray.png", speaker: "女主角", text: "好香的味道～<br>（托盤上的咖啡旁，似乎壓著一張折起來的紙條）", action: "showPaperInteract" },
        { bg: "JiangYi/Tray.png", speaker: "旁白", text: "看完紙條的那刻，心頭暖暖的，露出了滿足的微笑。" }
    ];

    let historyStack = []; 
    let currentIndex = 0;
    let isWaitingForInput = false;

    function renderLine(index) {
        if (index >= scriptLines.length) return;
        const line = scriptLines[index];
        
        // 更新背景
        document.getElementById("bg-image").src = line.bg;
        
        // 更新對話
        const nameBox = document.getElementById("speaker-name");
        if (line.speaker) {
            nameBox.innerText = line.speaker;
            nameBox.style.display = "block";
        } else {
            nameBox.style.display = "none";
        }
        document.getElementById("dialogue-text").innerHTML = line.text;
        document.getElementById("dialogue-box").style.display = "block";
        
        // 更新回溯按鈕
        document.getElementById("back-btn").disabled = (historyStack.length === 0);

        // 隱藏所有互動元件，視情況開啟
        document.getElementById("interact-btn").style.display = "none";
        document.getElementById("options-container").style.display = "none";
        document.getElementById("dialogue-box").style.pointerEvents = "auto";
        isWaitingForInput = false;

        // 檢查是否有選項
        if (line.options) {
            isWaitingForInput = true;
            document.getElementById("dialogue-box").style.pointerEvents = "none";
            const optContainer = document.getElementById("options-container");
            optContainer.innerHTML = "";
            line.options.forEach(opt => {
                const btn = document.createElement("div");
                btn.className = "option-btn";
                btn.innerText = opt.text;
                btn.onclick = () => selectOption(opt.nextLine);
                optContainer.appendChild(btn);
            });
            optContainer.style.display = "flex";
        }

        // 檢查是否有紙條
        if (line.action === "showPaperInteract") {
            isWaitingForInput = true;
            document.getElementById("interact-btn").style.display = "block";
            document.getElementById("dialogue-box").style.pointerEvents = "none";
        }
    }

    function nextLine() {
        if (isWaitingForInput) return;
        historyStack.push(currentIndex);
        currentIndex++;
        renderLine(currentIndex);
    }

    function selectOption(next) {
        historyStack.push(currentIndex);
        currentIndex = next;
        renderLine(currentIndex);
    }

    function prevLine() {
        if (historyStack.length === 0) return;
        currentIndex = historyStack.pop();
        renderLine(currentIndex);
    }

    function openPaper() {
        document.getElementById("paper-modal").style.display = "flex";
    }

    function closePaper() {
        document.getElementById("paper-modal").style.display = "none";
        historyStack.push(currentIndex);
        currentIndex++;
        renderLine(currentIndex);
    }

    window.onload = () => renderLine(currentIndex);
</script>
</body>
</html>
