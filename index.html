<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe JiangYi - 初次相遇</title>
    <style>
        body { margin: 0; padding: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: "Microsoft JhengHei", sans-serif; overflow: hidden; }
        #game-container { position: relative; width: 1280px; height: 720px; background-color: #000; box-shadow: 0 0 20px rgba(0,0,0,0.8); overflow: hidden; }
        #bg-image { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.5s ease-in-out; }
        #back-btn { position: absolute; top: 20px; right: 20px; background-color: rgba(166, 124, 82, 0.7); color: white; border: 1px solid #fff; padding: 8px 15px; border-radius: 5px; cursor: pointer; z-index: 100; font-size: 16px; transition: 0.3s; }
        #back-btn:hover { background-color: rgba(166, 124, 82, 1); }
        #back-btn:disabled { display: none; }
        #dialogue-box { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); width: 90%; height: 180px; background-color: rgba(20, 20, 20, 0.85); border: 2px solid #a67c52; border-radius: 10px; box-sizing: border-box; padding: 40px 30px 20px 30px; color: #fff; cursor: pointer; display: none; z-index: 50; }
        #speaker-name { position: absolute; top: -20px; left: 30px; background-color: #a67c52; color: #fff; padding: 5px 20px; font-size: 22px; font-weight: bold; border-radius: 5px; letter-spacing: 2px; display: none; }
        #dialogue-text { font-size: 22px; line-height: 1.6; letter-spacing: 1px; }
        #options-container { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; gap: 20px; width: 60%; display: none; z-index: 60; }
        .option-btn { background-color: rgba(255, 255, 255, 0.9); color: #333; border: 2px solid #a67c52; padding: 15px 20px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; text-align: center; }
        .option-btn:hover { background-color: #a67c52; color: #fff; }
        #interact-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: rgba(255, 255, 255, 0.8); border: 2px dashed #a67c52; padding: 15px 30px; font-size: 24px; font-weight: bold; color: #5c3a21; cursor: pointer; border-radius: 10px; animation: pulse 1.5s infinite; display: none; z-index: 70; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 70% { transform: translate(-50%, -50%) scale(1.05); } 100% { transform: translate(-50%, -50%) scale(1); } }
        #paper-modal { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 80; }
        #paper-content { background-color: #fdf5e6; width: 500px; height: 300px; padding: 40px; box-sizing: border-box; border-radius: 5px; font-size: 30px; color: #333; display: flex; justify-content: center; align-items: center; text-align: center; cursor: pointer; transform: rotate(-2deg); }
    </style>
</head>
<body>
<div id="game-container">
    <img id="bg-image" src="" alt="背景">
    <button id="back-btn" onclick="prevLine()" disabled>← 往回</button>
    <div id="options-container"></div>
    <div id="interact-btn" onclick="openPaper()">點擊查看紙條</div>
    <div id="paper-modal" onclick="closePaper()"><div id="paper-content">『可以坐久一點沒關係。』</div></div>
    <div id="dialogue-box" onclick="nextLine()"><div id="speaker-name"></div><div id="dialogue-text"></div></div>
</div>

<script>
    const scriptLines = [
        { bg: "JiangYi/Street-1.png", speaker: "女主角 (OS)", text: "好累……經歷了一個早上的課程，好想找個地方趴一下……<br>嗯？好濃郁的咖啡烘焙香氣……" },
        { bg: "JiangYi/Wind chimes.png", speaker: "", text: "（妳順著香味，推開了街角一間咖啡廳的門。）<br>— 清脆的風鈴聲響起 —" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "你好～歡迎光臨，請問今天想喝點什麼？" },
        { bg: "Menu.png", speaker: "女主角 (OS)", text: "（看看菜單上有什麼吧……）", 
          options: [{ text: "推薦一下？", nextLine: 4 }, { text: "熱美式", nextLine: 5 }] },
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "燕麥奶拿鐵適合疲憊的妳。", nextLine: 6 },
        { bg: "JiangYi/Making Coffee.png", speaker: "江逸", text: "好的，一杯熱美式。", nextLine: 6 },
        { bg: "JiangYi/Start Counter.png", speaker: "女主角", text: "謝謝你！" },
        { bg: "JiangYi/Start Counter.png", speaker: "江逸", text: "坐窗邊那個位置吧。" },
        { bg: "JiangYi/Love Seat.png", speaker: "女主角", text: "好啊，謝謝你！" },
        { bg: "JiangYi/Seat Window.png", speaker: "女主角 (OS)", text: "感覺坐在這裡好放鬆……" },
        { bg: "JiangYi/Tray.png", speaker: "女主角", text: "好香……還有紙條？", action: "showPaperInteract" },
        { bg: "JiangYi/Tray.png", speaker: "旁白", text: "心頭暖暖的。" }
    ];

    let historyStack = []; let currentIndex = 0; let isWaitingForInput = false;

    function renderLine(index, isBacking = false) {
        if (index >= scriptLines.length) return;
        const line = scriptLines[index];
        document.getElementById("bg-image").src = line.bg;
        const nameBox = document.getElementById("speaker-name");
        nameBox.innerText = line.speaker || "";
        nameBox.style.display = line.speaker ? "block" : "none";
        document.getElementById("dialogue-text").innerHTML = line.text;
        document.getElementById("dialogue-box").style.display = "block";
        document.getElementById("back-btn").disabled = (historyStack.length === 0);
        
        const interactBtn = document.getElementById("interact-btn");
        if (line.action === "showPaperInteract") {
            isWaitingForInput = true; interactBtn.style.display = "block";
            document.getElementById("dialogue-box").style.pointerEvents = "none";
        } else { interactBtn.style.display = "none"; }

        const optContainer = document.getElementById("options-container");
        if (line.options) {
            isWaitingForInput = true; document.getElementById("dialogue-box").style.pointerEvents = "none";
            optContainer.innerHTML = ""; optContainer.style.display = "flex";
            line.options.forEach(opt => {
                const btn = document.createElement("div"); btn.className = "option-btn";
                btn.innerText = opt.text; btn.onclick = () => selectOption(opt.nextLine);
                optContainer.appendChild(btn);
            });
        } else { optContainer.style.display = "none"; }
    }

    function nextLine() { if (isWaitingForInput) return; historyStack.push(currentIndex); currentIndex++; renderLine(currentIndex); }
    function prevLine() { if (historyStack.length === 0) return; currentIndex = historyStack.pop(); isWaitingForInput = false; document.getElementById("dialogue-box").style.pointerEvents = "auto"; document.getElementById("paper-modal").style.display = "none"; renderLine(currentIndex, true); }
    function selectOption(next) { historyStack.push(currentIndex); isWaitingForInput = false; document.getElementById("dialogue-box").style.pointerEvents = "auto"; currentIndex = next; renderLine(currentIndex); }
    function openPaper() { document.getElementById("interact-btn").style.display = "none"; document.getElementById("paper-modal").style.display = "flex"; }
    function closePaper() { document.getElementById("paper-modal").style.display = "none"; document.getElementById("dialogue-box").style.pointerEvents = "auto"; isWaitingForInput = false; historyStack.push(currentIndex); currentIndex++; renderLine(currentIndex); }
    window.onload = () => renderLine(currentIndex);
</script>
</body>
</html>
